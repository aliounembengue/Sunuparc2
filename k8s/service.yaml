apiVersion: v1
kind: Service
metadata:
  name: monapp-service
  labels:
    app: monapp
spec:
  type: NodePort
  selector:
    app: monapp   # Doit matcher .spec.template.metadata.labels du Deployment
  ports:
    - name: http
      port: 80           # Port exposé par le Service dans le cluster
      targetPort: 80     # Port du conteneur (Apache/Nginx)
      nodePort: 30080    # (optionnel) Port sur le nœud (30000-32767). Laisse vide pour auto-assignation.