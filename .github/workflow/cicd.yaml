#phase de test
steps:
  - uses: actions/checkout@v3

  - name: Installer PHP
    uses: shivammathur/setup-php@v2
    with:
      php-version: '8.2'

  - name: Installer dépendances
    run: composer install

  - name: Lancer tests PHPUnit
    run: ./vendor/bin/phpunit


    

build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3
      
      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/monapp:${{ github.sha }} .

      - name: Push image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/monapp:${{ github.sha }}


        deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - uses: actions/checkout@v3

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configurer kubeconfig
        run: |
          mkdir ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Mise à jour du déploiement
        run: |
          sed -i "s|IMAGE_URL|${{ secrets.DOCKERHUB_USERNAME }}/monapp:${{ github.sha }}|" k8s/deployment.yaml
          kubectl apply -f k8s/

